<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  html,body { background:#000; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","SimHei",sans-serif; }

  .win { width:1180px; height:720px; display:flex; overflow:hidden; background:#161614; color:#c8c8c4; }

  /* ---------- Sidebar ---------- */
  .sb { width:220px; flex-shrink:0; border-right:1px solid #2a2a28; background:#222220; display:flex; flex-direction:column; }
  .sb-head { height:48px; flex-shrink:0; border-bottom:1px solid #2a2a28; background:#2C2C2A; display:flex; align-items:center; gap:8px; padding:0 12px; }
  .logo { width:28px; height:28px; border-radius:8px;
    background:linear-gradient(135deg,#534AB7 0%,#2b2552 60%,#1a1730 100%);
    display:grid; place-items:center; color:#cfc9ff; font-weight:800; font-size:13px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.10), 0 1px 2px rgba(0,0,0,.4); position:relative; }
  .logo::before { content:""; position:absolute; width:9px; height:9px; border:2px solid #b9b0ff; border-radius:2px; transform:rotate(45deg); }
  .logo span { position:relative; z-index:2; font-size:0; }
  .sb-title { font-size:15px; font-weight:600; color:#cfc9bf; letter-spacing:-.2px; }
  .sb-head .sp { margin-left:auto; display:flex; gap:2px; }
  .iconbtn { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:#888780; cursor:default; }
  .iconbtn:hover { background:#353533; color:#b4b2a9; }

  .sb-tabs { display:flex; border-bottom:1px solid #2a2a28; flex-shrink:0; }
  .sb-tabs .t { flex:1; height:42px; display:grid; place-items:center; color:#888780; cursor:default; border-bottom:2px solid transparent; }
  .sb-tabs .t.on { color:#7F77DD; border-bottom-color:#534AB7; }
  .sb-tabs .t:hover { color:#b4b2a9; }

  .sb-body { flex:1; display:flex; flex-direction:column; min-height:0; }
  .sb-sec-head { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid #2a2a28; }
  .sb-sec-head .lbl { font-size:12px; font-weight:600; color:#b4b2a9; display:flex; align-items:center; gap:6px; }
  .sb-search { margin:6px 8px; display:flex; align-items:center; gap:6px; background:#2C2C2A; border:1px solid #3E3E3C; border-radius:7px; padding:5px 8px; }
  .sb-search input { flex:1; background:transparent; border:none; outline:none; color:#c8c8c4; font-size:12px; }
  .sb-search input::placeholder { color:#6a6a64; }
  .tree { flex:1; overflow:hidden; padding:4px 0; }
  .tnode { display:flex; align-items:center; gap:4px; padding:5px 8px; font-size:12px; color:#b4b2a9; cursor:default; border-radius:4px; margin:0 4px; }
  .tnode:hover { background:#2C2C2A; }
  .tnode.sel { background:rgba(83,74,183,.20); color:#a79cf0; }
  .tnode .nm { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tnode .cnt { color:#6a6a64; font-size:11px; }
  .tnode .caret { width:16px; height:16px; display:grid; place-items:center; color:#6a6a64; flex-shrink:0; }
  .tnode .hash { width:16px; height:16px; display:grid; place-items:center; color:#6a6a64; flex-shrink:0; margin-left:2px; }
  .tnode.child { padding-left:24px; }
  .tnode.child2 { padding-left:40px; }
  .dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

  /* ---------- Main ---------- */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .toolbar { height:44px; flex-shrink:0; border-bottom:1px solid #3E3E3C; display:flex; align-items:center; gap:12px; padding:0 16px; }
  .searchbox { display:flex; align-items:center; gap:8px; width:320px; color:#888780; }
  .searchbox input { flex:1; background:transparent; border:none; outline:none; color:#c8c8c4; font-size:13px; min-width:0; }
  .searchbox input::placeholder { color:#6a6a64; }
  .resize { width:6px; height:20px; display:grid; place-items:center; cursor:col-resize; }
  .resize i { width:1px; height:14px; background:#3E3E3C; display:block; }
  .vline { width:1px; height:20px; background:#3E3E3C; }
  .tbtn { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:#888780; cursor:default; }
  .tbtn:hover { background:#353533; color:#b4b2a9; }
  .tbtn.active { background:rgba(83,74,183,.20); color:#a79cf0; }
  .tbtn:disabled { opacity:.3; }
  .fs-pill { display:flex; align-items:center; gap:2px; padding:3px 7px; border-radius:8px; background:rgba(44,44,42,.6); border:1px solid rgba(62,62,60,.5); color:#888780; }
  .fs-pill .num { font-size:11px; font-weight:600; color:#b4b2a9; min-width:22px; text-align:center; }
  .fs-pill button { width:20px; height:20px; display:grid; place-items:center; color:#888780; border-radius:5px; cursor:default; }
  .fs-pill button:hover { color:#7F77DD; background:#353533; }
  .fs-pill button:disabled { opacity:.25; }
  .win-ctrl { margin-left:auto; display:flex; align-items:center; gap:2px; padding-left:8px; }
  .win-ctrl button { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:#888780; cursor:default; }
  .win-ctrl button:hover { background:#353533; color:#b4b2a9; }
  .win-ctrl button.close:hover { background:rgba(239,68,68,.8); color:#fff; }

  .body { flex:1; display:flex; min-height:0; }
  .grid { flex:1; overflow:hidden; padding:16px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; align-content:start; }

  .card { border-radius:12px; overflow:hidden; cursor:default; border:1px solid transparent; background:rgba(44,44,42,.5); }
  .card.sel { border-color:#534AB7; background:rgba(83,74,183,.10); }
  .card .wave { height:96px; background:#2C2C2A; display:flex; align-items:center; justify-content:center; position:relative; }
  .card .wave svg { width:100%; height:40px; }
  .card .star { position:absolute; top:8px; right:8px; color:#F59E0B; }
  .card .dotgreen { position:absolute; top:10px; right:10px; width:8px; height:8px; border-radius:50%; background:#22c55e; }
  .card .info { padding:12px; }
  .card .fn { font-size:13px; font-weight:600; color:#c8c8c4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:6px; }
  .card .desc { font-size:11px; color:#888780; line-height:1.5; height:33px; overflow:hidden; margin-bottom:8px; }
  .card .meta { display:flex; align-items:center; justify-content:space-between; font-size:11px; color:#888780; }
  .badge-fmt { padding:1px 6px; border-radius:5px; background:#2a2a28; color:#888780; font-size:11px; }
  .card.sel .desc { color:#9a9a90; }

  /* ---------- Detail panel ---------- */
  .detail { width:320px; flex-shrink:0; border-left:1px solid #2a2a28; background:#1e1e1c; display:flex; flex-direction:column; overflow:hidden; }
  .detail-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #2a2a28; }
  .detail-head .t { font-size:13px; font-weight:600; color:#b8b8b4; }
  .detail-body { flex:1; overflow:hidden; padding:16px; display:flex; flex-direction:column; gap:20px; }
  .fn-big { font-size:15px; font-weight:600; color:#c8c8c4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fp { font-size:11px; color:#6a6a64; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:4px; }
  .ai-btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:10px; border-radius:10px; font-size:13px; font-weight:600;
    background:#1a1a18; color:#b8b8b4; border:1px solid #2a2a28; cursor:default; }
  .player { background:#1a1a18; border:1px solid #2a2a28; border-radius:10px; padding:12px; }
  .player .pw { height:64px; background:#141412; border-radius:8px; position:relative; overflow:hidden; margin-bottom:12px; }
  .player .pw svg { position:absolute; inset:0; width:100%; height:100%; }
  .player .pct { position:absolute; bottom:0; left:0; height:2px; background:#534AB7; border-radius:2px; }
  .pctrl { display:flex; align-items:center; justify-content:space-between; }
  .pctrl .left { display:flex; align-items:center; gap:4px; color:#6a6a64; }
  .pctrl .left button { width:30px; height:30px; display:grid; place-items:center; border-radius:8px; cursor:default; }
  .pctrl .left button:hover { color:#b8b8b4; }
  .playbig { width:36px; height:36px; border-radius:50%; background:#534AB7; display:grid; place-items:center; color:#fff; cursor:default; }
  .playbig:hover { background:#5e53c4; }
  .ptime { font-size:11px; color:#8a8a82; font-family:"JetBrains Mono",Consolas,monospace; }
  .sec-lbl { font-size:11px; color:#6a6a64; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
  .desc-txt { font-size:13px; color:#c8c8c4; line-height:1.7; }
  .sub-txt { font-size:13px; color:#8a8a82; line-height:1.7; }
  .chip-row { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { font-size:12px; padding:3px 10px; border-radius:999px; background:rgba(83,74,183,.10); color:#9C92F6; border:1px solid rgba(83,74,183,.20); }
  .tagchip { font-size:12px; padding:3px 10px; border-radius:999px; background:#252524; color:#8a8a82; border:1px solid #333; }
  .score { display:flex; align-items:center; gap:4px; }
  .score .b { width:20px; height:20px; border-radius:4px; background:#2a2a28; }
  .score .b.on { background:#534AB7; }
  .score .v { font-size:12px; color:#6a6a64; margin-left:6px; }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; }
  .irow { display:flex; align-items:center; gap:8px; }
  .irow .k { font-size:12px; color:#5a5a54; flex-shrink:0; }
  .irow .val { font-size:12px; color:#8a8a82; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .act-btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:9px; border-radius:8px; font-size:13px;
    background:#1a1a18; color:#8a8a82; border:1px solid #2a2a28; cursor:default; }
  .act-btn:hover { background:#252524; color:#b8b8b4; }
  .act-btn.star { background:rgba(245,158,11,.10); color:#F59E0B; border:1px solid rgba(245,158,11,.20); }

  /* ---------- Status bar ---------- */
  .statusbar { height:32px; flex-shrink:0; border-top:1px solid #2a2a28; display:flex; align-items:center; padding:0 16px; font-size:12px; color:#6a6a64; gap:20px; }
  .statusbar .accent { margin-left:auto; color:#7F77DD; }
</style>
</head>

function wave(seed){ let d='M0,24'; for(let i=0;i<40;i++){ const h=Math.sin(i*0.45+seed)*9+Math.sin(i*1.3+seed)*5+Math.sin(i*0.18)*3; d+=' L'+(i*5)+','+(24+h).toFixed(1);} return d; }

function renderTree(){
  let h='';
  const row=(node,depth,leaf)=>{
    const cls='tnode'+(node.sel?' sel':'')+(depth===1?' child':'')+(depth===2?' child2':'');
    const caret = node.ch&&node.ch.length ? '<span class="caret">'+ic(node.ex?'chevrond':'chevronr',14)+'</span>'
      : '<span class="hash">'+ic('hash',12)+'</span>';
    h+='<div class="'+cls+'">'+caret+'<span class="nm">'+node.n+'</span><span class="cnt">'+node.c+'</span></div>';
    if(node.ex && node.ch) node.ch.forEach(c=>row(c,depth+1));
  };
  tree.forEach(n=>row(n,0));
  return h;
}

function card(s,i){
  const cls='card'+(s.sel?' sel':'');
  const star = s.st ? '<span class="star">'+ic('star',14)+'</span>' : (s.an?'<span class="dotgreen"></span>':'');
  return '<div class="'+cls+'">'+
    '<div class="wave"><svg viewBox="0 0 200 48" preserveAspectRatio="none" style="opacity:'+(s.sel?0.7:0.35)+'">'+
      '<path d="'+wave(i*1.7)+'" fill="none" stroke="'+(s.sel?'#7F77DD':'#534AB7')+'" stroke-width="0.8"/></svg>'+star+'</div>'+
    '<div class="info"><div class="fn" title="'+s.fn+'">'+s.fn+'</div>'+
    '<div class="desc">'+(s.desc||'等待 AI 分析...')+'</div>'+
    '<div class="meta"><span>'+s.dur+'</span><span class="badge-fmt">'+s.fmt+'</span><span>'+s.size+'</span></div></div></div>';
}
