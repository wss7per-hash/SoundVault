appId: com.soundvault.app
productName: SoundVault
directories:
  buildResources: resources
  output: dist_build
# 普通压缩：maximum 在 portable 合成阶段会挂起（曾卡死 30min+），normal 快很多、体积仅略大
compression: normal
files:
  - "**/*"
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!dist/**"
  - "!dist_test/**"
  - "!dist_build/**"
  - "!dev/**"
  - "!.git/**"
  - "!.github/**"
  - "!scripts/**"
  - "!node_modules/.cache/**"
  # 排除一切媒体文件，确保打包产物不含用户导入的音频
  - "!*.wav"
  - "!*.mp3"
  - "!*.flac"
  - "!*.ogg"
  - "!*.m4a"
  - "!*.aac"
  - "!test_tone_loop3.wav"
win:
  target:
    - target: portable
      arch: [x64]
  icon: resources/icon.ico
# 复制品牌图标 PNG 到运行时 resources/，供主窗口+托盘运行时读取
# （buildResources 只用于编译 EXE 图标/查找资源，不会复制 png 到产物，
#  必须靠 extraResources 显式复制，否则 process.resourcesPath/icon.png 不存在 → 托盘图标为空）
extraResources:
  - from: resources/icon.png
    to: icon.png
mac:
  target: dmg
  icon: resources/icon.icns
linux:
  target: AppImage
  icon: resources/icon.png
# 注意：不要写 electronLanguages 来裁剪语言包。
# 该字段一旦指定，electron-builder 会在打包时批量删除其余所有 locales/*.pak，
# 本机安全删除防护对"单次≥50个文件"的批量删除会拦截，导致打包失败。
# 留空则 electron-builder 不删任何语言包（全部保留），打包可正常完成。
asarUnpack:
  - "**/*.node"
